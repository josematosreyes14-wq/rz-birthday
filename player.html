<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Canciones Para Ella</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/ambient.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/intro.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="assets/icon/icon.png">

</head>

<body>

    <section id="playlist">

        <div id="ambientGlow"></div>

        <div class="playlist-container">

            <div id="songContent">

                <div class="counter-container">

                    <p id="songCounter"></p>

                </div>

                <div class="album-container">

                    <img
                        id="albumCover"
                        src=""
                        alt="Portada del álbum">

                </div>

                <div class="song-info">

                    <h2 id="songTitle"></h2>

                    <h3 id="songArtist"></h3>

                    <p id="songDuration"></p>

                    <p id="songMessage"></p>

                </div>

            </div>

            <!-- Controles (no se animan) -->
            <div class="controls">

                <button id="previousButton">
                    ◀
                </button>

                <button id="youtubeButton">
                    Escuchar
                </button>

                <button id="nextButton">
                    ▶
                </button>

            </div>

            <button id="playlistButton">
                ☰ Playlist
            </button>

        </div>

    </section>

    <div id="overlay"></div>

    <aside id="sidebar">

        <div class="sidebar-header">

            <h2>Playlist</h2>

            <button 
                id="closeSidebarButton"
                aria-label="Cerrar playlist">

                ✕

            </button>

        </div>

        <div id="playlistList"></div>

    </aside>

    <script src="songs.js"></script>
    <script src="script.js"></script>

</body>

</html>
